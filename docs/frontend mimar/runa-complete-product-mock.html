<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Runa — Tam Ürün Mock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    :root {
      --surface-1: #14110D;
      --surface-2: #1E1A14;
      --surface-3: #2A241C;
      --surface-4: #332C22;
      --overlay: rgba(20, 17, 13, 0.82);
      --ink-1: #E8DFCD;
      --ink-2: #B9AE99;
      --ink-3: #847866;
      --accent: #E0805C;
      --accent-2: #F4A876;
      --accent-bg: #2A1E15;
      --status: #8FA277;
      --status-bg: #1D2618;
      --warn: #D4A055;
      --warn-bg: #2A2118;
      --error: #C97064;
      --error-bg: #2A1A18;
      --user-bg: #E8DFCD;
      --user-fg: #14110D;
      --hairline: rgba(232, 223, 205, 0.08);
      --shadow: 0 22px 56px rgba(0, 0, 0, 0.34);
      --radius-panel: 14px;
      --radius-card: 14px;
      --radius-input: 12px;
      --radius-pill: 999px;
      --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-serif: 'Instrument Serif', Georgia, serif;
      --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      --topbar-h: 66px;
    }

    body.th-light {
      --surface-1: #F6F1E8;
      --surface-2: #EDE6D6;
      --surface-3: #DFD5BE;
      --surface-4: #D0C8AD;
      --overlay: rgba(246, 241, 232, 0.82);
      --ink-1: #1F1B16;
      --ink-2: #3A332A;
      --ink-3: #6E6356;
      --accent: #B85A3C;
      --accent-2: #D97757;
      --accent-bg: #F0E0D2;
      --status: #6B7A5C;
      --status-bg: #E2E9D8;
      --warn: #9E6F2A;
      --warn-bg: #F2EAD7;
      --error: #A14638;
      --error-bg: #F2E0DC;
      --user-bg: #1F1B16;
      --user-fg: #F6F1E8;
      --hairline: rgba(31, 27, 22, 0.1);
      --shadow: 0 20px 48px rgba(45, 35, 23, 0.14);
    }

    body.th-rose {
      --surface-1: #18110F;
      --surface-2: #211719;
      --surface-3: #2E2122;
      --surface-4: #3A292B;
      --overlay: rgba(24, 17, 15, 0.84);
      --ink-1: #EFDCD8;
      --ink-2: #C2A8A5;
      --ink-3: #8A7370;
      --accent: #D88C8C;
      --accent-2: #ECAAA8;
      --accent-bg: #2D1D1F;
      --status: #B5A87A;
      --status-bg: #282719;
      --user-bg: #EFDCD8;
      --user-fg: #18110F;
      --hairline: rgba(239, 220, 216, 0.08);
    }

    body {
      font-family: var(--font-body);
      color: var(--ink-1);
      background: var(--surface-1);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow: hidden;
    }

    button, input, textarea, select { font: inherit; }
    button { border: 0; cursor: pointer; }
    a { color: inherit; }
    .hidden { display: none !important; }
    .desktop-only { display: initial; }
    .mobile-only { display: none !important; }

    @keyframes fadeInUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes shimmer { 0% { background-position: 200% center; } 100% { background-position: -200% center; } }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 currentColor; opacity: 1; } 70% { box-shadow: 0 0 0 7px transparent; opacity: .72; } 100% { box-shadow: 0 0 0 0 transparent; opacity: 1; } }
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }

    .runa-mark { width: 18px; height: 18px; display: inline-flex; align-items: center; justify-content: center; color: var(--accent); flex: 0 0 auto; }
    .runa-mark.mobile-only { width: 12px; height: 12px; }
    .runa-mark svg { width: 100%; height: 100%; display: block; }
    .pulse-dot { width: 7px; height: 7px; border-radius: 999px; background: var(--status); color: var(--status); display: inline-block; animation: pulse 2s ease-out infinite; }
    .shimmer-text { background: linear-gradient(90deg, var(--ink-3) 0%, var(--ink-1) 50%, var(--ink-3) 100%); background-size: 220% 100%; color: transparent; -webkit-background-clip: text; background-clip: text; animation: shimmer 2.2s linear infinite; }
    .kbd { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); padding: 2px 6px; border-radius: 6px; border: 1px solid var(--surface-4); background: var(--surface-2); }

    /* Auth */
    .auth-shell, .onboarding-shell {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 28px;
      overflow: auto;
    }
    .auth-wrap { width: min(1040px, 100%); display: grid; grid-template-columns: 1fr 420px; gap: 28px; align-items: stretch; }
    .auth-copy {
      border: 1px solid var(--surface-3);
      background: linear-gradient(145deg, color-mix(in srgb, var(--surface-2) 86%, transparent), color-mix(in srgb, var(--surface-1) 88%, transparent));
      border-radius: 28px;
      padding: 42px;
      min-height: 620px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }
    .auth-copy::after { content: ''; position: absolute; inset: auto -18% -34% auto; width: 320px; height: 320px; border-radius: 999px; background: radial-gradient(circle, color-mix(in srgb, var(--accent) 16%, transparent), transparent 72%); pointer-events: none; }
    .auth-logo { width: 52px; height: 52px; color: var(--accent); margin-bottom: 22px; }
    .auth-eyebrow { color: var(--ink-3); text-transform: uppercase; letter-spacing: .13em; font-size: 12px; margin-bottom: 14px; }
    .auth-title { font-family: var(--font-serif); font-size: clamp(44px, 7vw, 76px); line-height: .94; letter-spacing: -.035em; margin: 0 0 18px; font-weight: 400; }
    .auth-lead { color: var(--ink-2); font-size: 16px; max-width: 560px; margin: 0; }
    .auth-proof { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 32px; position: relative; z-index: 1; }
    .proof-card { padding: 14px; border-radius: 16px; border: 1px solid var(--hairline); background: color-mix(in srgb, var(--surface-2) 68%, transparent); }
    .proof-card strong { display: block; font-family: var(--font-serif); font-size: 22px; font-weight: 400; margin-bottom: 4px; }
    .proof-card span { color: var(--ink-3); font-size: 12px; }
    .auth-card { border: 1px solid var(--surface-3); border-radius: 28px; background: color-mix(in srgb, var(--surface-2) 92%, transparent); padding: 24px; box-shadow: var(--shadow); align-self: center; }
    .auth-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; padding: 4px; background: var(--surface-1); border-radius: 14px; border: 1px solid var(--hairline); margin-bottom: 20px; }
    .auth-tab { color: var(--ink-3); background: transparent; padding: 10px 12px; border-radius: 10px; font-size: 14px; }
    .auth-tab.active { color: var(--accent); background: var(--accent-bg); font-weight: 600; }
    .field { display: grid; gap: 7px; margin-bottom: 14px; }
    .label-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    label, .label { color: var(--ink-3); font-size: 12px; text-transform: uppercase; letter-spacing: .08em; }
    .input, .select, textarea.input {
      width: 100%;
      color: var(--ink-1);
      background: var(--surface-1);
      border: 1px solid var(--surface-3);
      border-radius: var(--radius-input);
      padding: 12px 14px;
      outline: none;
      transition: border .15s ease, box-shadow .15s ease, background .15s ease;
    }
    textarea.input { resize: vertical; min-height: 82px; }
    .input:focus, .select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 16%, transparent); }
    .input::placeholder { color: var(--ink-3); }
    .primary-btn, .ghost-btn, .danger-btn, .mini-btn, .pill-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      border-radius: var(--radius-input);
      padding: 11px 14px;
      font-weight: 600;
      transition: transform .05s ease, opacity .15s ease, background .15s ease, border .15s ease;
      white-space: nowrap;
    }
    .primary-btn { background: var(--accent); color: var(--surface-1); }
    .primary-btn:hover { opacity: .9; }
    .primary-btn:active, .ghost-btn:active, .danger-btn:active, .mini-btn:active, .pill-btn:active { transform: scale(.985); }
    .ghost-btn { color: var(--ink-2); background: transparent; border: 1px solid var(--surface-3); }
    .ghost-btn:hover { color: var(--ink-1); border-color: var(--surface-4); background: var(--surface-3); }
    .danger-btn { background: var(--error); color: var(--surface-1); }
    .mini-btn { padding: 7px 10px; font-size: 12px; color: var(--ink-2); background: var(--surface-2); border: 1px solid var(--surface-3); border-radius: 10px; }
    .mini-btn:hover { color: var(--ink-1); border-color: var(--surface-4); }
    .pill-btn { padding: 8px 12px; font-size: 12px; border-radius: var(--radius-pill); color: var(--ink-2); background: var(--surface-2); border: 1px solid var(--surface-3); }
    .pill-btn.active { background: var(--accent-bg); color: var(--accent); border-color: color-mix(in srgb, var(--accent) 42%, var(--surface-3)); }
    .auth-oauth { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
    .auth-divider { display: flex; gap: 10px; align-items: center; color: var(--ink-3); font-size: 11px; margin: 18px 0 12px; text-transform: lowercase; }
    .auth-divider::before, .auth-divider::after { content: ''; height: 1px; background: var(--surface-3); flex: 1; }
    .auth-note { color: var(--ink-3); font-size: 12px; line-height: 1.55; text-align: center; margin: 16px 0 0; }
    .auth-error { color: var(--error); background: var(--error-bg); border: 1px solid color-mix(in srgb, var(--error) 36%, transparent); padding: 9px 11px; border-radius: 12px; font-size: 12px; margin: 0 0 14px; display: none; }
    .auth-error.show { display: block; animation: fadeInUp .25s ease; }
    .dev-login { margin-top: 14px; border-top: 1px solid var(--hairline); padding-top: 14px; }
    .dev-login summary { cursor: pointer; color: var(--ink-3); font-size: 12px; }

    /* Onboarding */
    .onboarding-card { width: min(760px, 100%); border: 1px solid var(--surface-3); border-radius: 30px; background: color-mix(in srgb, var(--surface-2) 94%, transparent); box-shadow: var(--shadow); overflow: hidden; }
    .onboarding-head { padding: 30px 34px 18px; border-bottom: 1px solid var(--hairline); display: flex; justify-content: space-between; gap: 20px; align-items: flex-start; }
    .step-kicker { color: var(--ink-3); font-size: 12px; letter-spacing: .12em; text-transform: uppercase; }
    .onboarding-title { font-family: var(--font-serif); font-size: 38px; line-height: 1; margin: 8px 0 0; font-weight: 400; }
    .step-dots { display: flex; gap: 6px; padding-top: 6px; }
    .step-dots span { width: 8px; height: 8px; border-radius: 999px; background: var(--surface-4); }
    .step-dots span.active, .step-dots span.done { background: var(--accent); }
    .onboarding-body { padding: 28px 34px; }
    .onboarding-step { display: none; animation: fadeInUp .3s ease; }
    .onboarding-step.active { display: block; }
    .onboarding-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 24px; }
    .choice-card, .device-card, .file-card, .notif-item, .settings-card, .image-card {
      border: 1px solid var(--surface-3);
      background: color-mix(in srgb, var(--surface-2) 82%, transparent);
      border-radius: var(--radius-card);
      padding: 14px;
      transition: border .15s ease, background .15s ease, transform .15s ease;
    }
    .choice-card { cursor: pointer; }
    .choice-card:hover, .device-card.clickable:hover, .file-card.clickable:hover { transform: translateY(-1px); border-color: var(--surface-4); }
    .choice-card.selected, .device-card.active { border-color: var(--accent); background: var(--accent-bg); }
    .choice-icon { font-size: 20px; margin-bottom: 8px; }
    .choice-title { font-weight: 700; color: var(--ink-1); font-size: 14px; }
    .choice-desc { color: var(--ink-3); font-size: 12px; margin-top: 4px; line-height: 1.45; }
    .onboarding-foot { border-top: 1px solid var(--hairline); padding: 18px 34px 28px; display: flex; justify-content: space-between; gap: 12px; }

    /* App Shell */
    .app-shell { height: 100dvh; display: grid; grid-template-columns: 240px minmax(0, 1fr); background: var(--surface-1); overflow: hidden; }
    .sidebar { border-right: 1px solid var(--surface-3); background: color-mix(in srgb, var(--surface-1) 92%, #000 8%); display: flex; flex-direction: column; min-width: 0; }
    .sidebar-head { padding: 18px 16px 14px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .brand { display: flex; align-items: center; gap: 9px; font-family: var(--font-serif); font-size: 24px; line-height: 1; }
    .brand .runa-mark { width: 18px; height: 18px; }
    .nav-block { padding: 0 10px; display: grid; gap: 3px; }
    .nav-item { width: 100%; display: flex; align-items: center; gap: 10px; color: var(--ink-3); background: transparent; padding: 9px 10px; border-radius: 10px; text-align: left; font-size: 13px; }
    .nav-item:hover { color: var(--ink-1); background: var(--surface-2); }
    .nav-item.active { color: var(--accent); background: var(--accent-bg); }
    .nav-icon { width: 18px; text-align: center; opacity: .9; }
    .nav-badge { margin-left: auto; min-width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; border-radius: 999px; background: var(--surface-3); color: var(--ink-2); }
    .new-chat-btn { margin: 0 10px 12px; }
    .sidebar-section-title { padding: 16px 18px 8px; color: var(--ink-3); font-size: 11px; text-transform: uppercase; letter-spacing: .1em; }
    .convo-list { padding: 0 10px; overflow: auto; display: grid; gap: 3px; }
    .convo-item { display: grid; gap: 2px; width: 100%; color: var(--ink-2); background: transparent; text-align: left; padding: 9px 10px; border-radius: 10px; }
    .convo-item:hover, .convo-item.active { background: var(--surface-2); color: var(--ink-1); }
    .convo-title { font-size: 12.5px; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
    .convo-meta { color: var(--ink-3); font-size: 11px; }
    .sidebar-foot { margin-top: auto; padding: 12px 10px 14px; border-top: 1px solid var(--hairline); display: grid; gap: 8px; }
    .device-mini { display: flex; align-items: center; gap: 9px; padding: 10px; border-radius: 12px; background: var(--surface-2); border: 1px solid var(--surface-3); cursor: pointer; }
    .device-mini:hover { border-color: var(--surface-4); }
    .device-mini-title { font-size: 12.5px; color: var(--ink-1); }
    .device-mini-sub { color: var(--ink-3); font-size: 11px; }
    .main { height: 100dvh; min-width: 0; display: flex; flex-direction: column; }
    .topbar { height: var(--topbar-h); flex: 0 0 var(--topbar-h); border-bottom: 1px solid var(--surface-3); display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 0 20px; background: color-mix(in srgb, var(--surface-1) 88%, transparent); backdrop-filter: blur(16px); z-index: 30; }
    .topbar-left { min-width: 0; display: flex; align-items: center; gap: 12px; }
    .topbar-title { font-weight: 700; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .topbar-sub { display: flex; align-items: center; gap: 7px; color: var(--ink-3); font-size: 12px; margin-top: 2px; }
    .topbar-actions { display: flex; align-items: center; gap: 7px; }
    .icon-btn { width: 36px; height: 36px; display: inline-flex; align-items: center; justify-content: center; border-radius: 11px; color: var(--ink-3); background: transparent; border: 1px solid transparent; }
    .icon-btn:hover { color: var(--ink-1); background: var(--surface-2); border-color: var(--surface-3); }
    .view-host { flex: 1; min-height: 0; overflow: auto; padding: 22px; }
    .stage { max-width: 980px; margin: 0 auto; animation: fadeInUp .25s ease; }
    .chat-stage { max-width: 680px; height: 100%; min-height: 0; display: flex; flex-direction: column; margin: 0 auto; }
    .chat-scroll { flex: 1; min-height: 0; overflow: auto; padding: 10px 6px 22px; display: flex; flex-direction: column; gap: 18px; scroll-behavior: smooth; }
    .day-divider { align-self: center; font-size: 11px; color: var(--ink-3); padding: 4px 11px; border-radius: 999px; background: color-mix(in srgb, var(--surface-2) 56%, transparent); border: 1px solid var(--hairline); }
    .msg-user { align-self: flex-end; max-width: min(78%, 560px); background: var(--user-bg); color: var(--user-fg); padding: 10px 15px; border-radius: 18px 18px 5px 18px; font-size: 14.5px; line-height: 1.52; animation: fadeInUp .25s ease; }
    .msg-agent { align-self: flex-start; width: min(100%, 640px); display: grid; grid-template-columns: 22px 1fr; gap: 9px; animation: fadeInUp .25s ease; }
    .msg-agent .runa-mark { width: 18px; height: 18px; margin-top: 2px; }
    .agent-name { display: none; }
    .agent-content { color: var(--ink-1); font-size: 14.5px; line-height: 1.64; }
    .agent-content strong { color: var(--accent); font-weight: 600; }
    .agent-content p { margin: 0 0 10px; }
    .agent-content p:last-child { margin-bottom: 0; }
    .stream-cursor { display: inline-block; width: 2px; height: 1em; background: var(--accent); vertical-align: -2px; margin-left: 2px; animation: blink 1s infinite; }
    .tool-line { align-self: flex-start; display: inline-flex; align-items: center; gap: 7px; color: var(--ink-3); background: transparent; padding: 3px 0; font-family: var(--font-mono); font-size: 11.5px; }
    .tool-line:hover { color: var(--ink-2); }
    .tool-dot { width: 5px; height: 5px; border-radius: 999px; background: var(--accent); flex: 0 0 auto; }
    .tool-line .chev { opacity: .5; transition: transform .18s ease; }
    .tool-line.open .chev { transform: rotate(90deg); }
    .tool-detail, .detail-panel { margin: 6px 0 0 0; border-left: 2px solid var(--accent); background: color-mix(in srgb, var(--surface-2) 78%, transparent); border-radius: 0 12px 12px 0; padding: 10px 12px; color: var(--ink-2); font-family: var(--font-mono); font-size: 11.5px; line-height: 1.55; overflow-x: auto; display: none; }
    .tool-detail.open, .detail-panel.open { display: block; animation: fadeInUp .2s ease; }
    .chip-row { display: flex; flex-wrap: wrap; gap: 6px; margin: 9px 0 0; }
    .chip { display: inline-flex; align-items: center; gap: 6px; padding: 5px 9px; border-radius: 999px; background: var(--surface-2); border: 1px solid var(--surface-3); color: var(--ink-3); font-size: 11.5px; }
    .chip.accent { color: var(--accent); background: var(--accent-bg); border-color: color-mix(in srgb, var(--accent) 38%, var(--surface-3)); }
    .chip.ok { color: var(--status); background: var(--status-bg); }
    .chip.warn { color: var(--warn); background: var(--warn-bg); }
    .approval { align-self: flex-start; width: min(100%, 620px); border: 1px solid var(--surface-3); background: color-mix(in srgb, var(--surface-2) 82%, transparent); border-radius: 12px; padding: 12px; animation: fadeInUp .25s ease; }
    .approval.warn { border-color: color-mix(in srgb, var(--warn) 38%, var(--surface-3)); background: var(--warn-bg); }
    .approval-top { display: flex; gap: 9px; align-items: flex-start; }
    .approval .runa-mark { width: 18px; height: 18px; margin-top: 1px; }
    .approval-q { font-size: 14px; color: var(--ink-1); line-height: 1.55; }
    .approval-target { display: inline-flex; align-items: center; max-width: 100%; padding: 4px 8px; border-radius: 8px; margin: 8px 0 10px; font-family: var(--font-mono); font-size: 11.5px; color: var(--ink-2); background: var(--surface-1); border: 1px solid var(--surface-3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .approval.warn .approval-target { border-color: color-mix(in srgb, var(--warn) 40%, var(--surface-3)); color: var(--warn); }
    .approval-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .approval-resolved { align-self: flex-start; display: inline-flex; align-items: center; gap: 8px; color: var(--ink-3); background: color-mix(in srgb, var(--surface-2) 74%, transparent); border: 1px solid var(--hairline); border-radius: 999px; padding: 7px 10px; font-size: 12px; }
    .error-card { align-self: flex-start; max-width: 620px; border-left: 2px solid var(--error); background: var(--error-bg); color: var(--ink-1); border-radius: 0 12px 12px 0; padding: 12px 13px; animation: fadeInUp .25s ease; }
    .error-card strong { color: var(--error); }
    .image-preview { max-width: 460px; border: 1px solid var(--surface-3); border-radius: 16px; overflow: hidden; background: var(--surface-2); margin-top: 8px; }
    .image-art { min-height: 260px; background: radial-gradient(circle at 25% 20%, var(--accent-2), transparent 24%), radial-gradient(circle at 78% 30%, var(--status), transparent 22%), linear-gradient(135deg, var(--surface-3), var(--accent-bg)); position: relative; }
    .image-art::after { content: ''; position: absolute; inset: 18%; border: 2px solid color-mix(in srgb, var(--ink-1) 38%, transparent); border-radius: 32% 68% 58% 42% / 34% 31% 69% 66%; box-shadow: inset 0 0 0 18px color-mix(in srgb, var(--surface-1) 28%, transparent); }

    function loadState() {

        return mergeDeep(defaultState(), parsed);
      } catch (error) {
        return defaultState();
      }
    }
    function mergeDeep(target, source) {
      const out = Array.isArray(target) ? [...target] : { ...target };
      Object.keys(source || {}).forEach(key => {
        if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key]) && target[key]) out[key] = mergeDeep(target[key], source[key]);
        else out[key] = source[key];
      });
      return out;
    }
    function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

        <div class="approval-actions"><button class="ghost-btn" data-action="export-data">Veriyi dışa aktar</button><button class="danger-btn" data-action="reset-mock">Yerel mock’u sıfırla</button></div>

    function viewHead(title, lead) {
      return `<div class="view-head"><div><div class="view-kicker">Runa Product Mock</div><h1 class="view-title">${title}</h1><p class="view-lead">${lead}</p></div><div class="chip-row"><span class="chip accent">${esc(activeDevice().name)}</span>${state.settings.advanced ? '<span class="chip warn">Gelişmiş açık</span>' : ''}</div></div>`;
    }

    function addMessage(message) {
      state.messages.push({ id: uid('msg'), ...message });
      state.conversations[0].meta = 'Şimdi · ' + state.messages.length + ' mesaj';
      state.timeline.push(message.type ? `${message.type} eklendi` : `${message.role || 'agent'} mesajı eklendi`);
      saveState();
    }

    function sendChat(text) {
      const value = (text || $('#chatInput')?.value || '').trim();
      if (!value) return;
      if ($('#chatInput')) $('#chatInput').value = '';
      addMessage({ role: 'user', content: value });
      addMessage({ role: 'agent', content: 'Düşünüyor', streaming: true });
      state.currentView = 'chat';
      render();
      clearTimeout(typingTimer);
      typingTimer = setTimeout(() => finishChatResponse(value), 820);
    }

    function finishChatResponse(value) {
      const last = state.messages[state.messages.length - 1];
      if (last && last.streaming) state.messages.pop();
      const lower = value.toLocaleLowerCase('tr-TR');
      if (lower.includes('ubuntu')) {
        state.activeDeviceId = 'ubuntu';
        addMessage({ type: 'tool', summary: 'Hedef değişti', target: 'Ubuntu Server', detail: 'target: Ubuntu Server\nstatus: online\nBu sohbetin sonraki komutları Ubuntu Server üzerinde çalışır.' });
        addMessage({ role: 'agent', content: 'Hedefi **Ubuntu Server** olarak değiştirdim. Sohbet aynı kaldı; bundan sonraki terminal işleri orada çalışacak.' });
      } else if (lower.includes('sil') || lower.includes('rm ') || lower.includes('risk')) {
        addMessage({ type: 'approval', risk: 'high', status: 'pending', question: 'Kalıcı silme işlemi yapmak istiyorum. Bu geri alınamaz — devam edeyim mi?', target: 'rm ./logs/*.log', approveLabel: 'Yine de sil', detail: 'risk: high\nestimated_size: 193 MB\nbackup: none\ntool: shell.exec\ncall_id: mock_delete_771' });
      } else if (lower.includes('görsel') || lower.includes('logo') || lower.includes('image')) {
        const style = randomImageStyle();
        addMessage({ type: 'tool', summary: 'görsel üretimi hazırlandı', target: activeDevice().name, detail: 'prompt hazırlandı\nstyle: Warm Paper\npreview: generated locally in mock' });
        addMessage({ type: 'image', content: 'Tamam, sakin bir warm-paper taslak oluşturdum.', prompt: value, style, kind: 'Warm Paper · Line', size: '1024×1024' });
      } else if (lower.includes('dosya') || lower.includes('oku') || lower.includes('aç')) {
        addMessage({ type: 'approval', risk: 'low', status: 'pending', question: 'Dosyayı açıp ilgili kısmı gösterebilirim — okumama izin verir misin?', target: 'RUNA-DESIGN-BRIEF.md', detail: 'İstek: dosya okuma\nTool: file.read\ncall_id: mock_read_552' });
      } else if (activeDevice().status !== 'online') {
        addMessage({ type: 'error', content: `${activeDevice().name} şu an çevrimdışı. İstersen cihaz çevrimiçi olduğunda otomatik denerim ya da hedefi MacBook Pro’ya alabilirim.`, detail: 'device_status: offline\nlast_seen: 2 saat önce\nrecovery: switch target or retry later' });
      } else {
        addMessage({ type: 'tool', summary: '2 komut çalıştırıldı', target: activeDevice().name, detail: '$ git status --short\n M apps/web/src/components/chat/ApprovalBlock.tsx\n M apps/web/src/styles/components.css\n\n$ pnpm test DesignLanguageLock\nPASS 6 checks' });
        addMessage({ role: 'agent', content: responseFor(value) });
      }
      render();
    }

    function responseFor(value) {
      const prefix = state.settings.tone === 'formal' ? 'Kontrol ettim.' : state.settings.tone === 'friendly' ? 'Baktım, güzel bir sadeleştirme yolu var.' : 'Baktım.';
      if (state.settings.length === 'short') return `${prefix} En güvenli yol: tekrar eden çalışma özetini kaldır, approval’ı tek karar satırına indir, detayları sadece kullanıcı açarsa göster.`;
      if (state.settings.length === 'detailed') return `${prefix} Üç parçalı bir plan öneriyorum:\n\n1. Ana chat’te sadece kullanıcı mesajı, Runa yanıtı, tek satır tool aktivitesi ve düşük profilli approval kalsın.\n2. Cihaz bilgisi header subtitle’ında dursun; ayrı right rail tekrarına gerek yok.\n3. Gelişmiş görünüm açık değilse raw tool adı, call_id ve runtime chip’leri gizlensin.\n\nBu mock’ta aynı kararları uyguladım.`;
      return `${prefix} Ana önerim: chat akışını birincil yüzey yapalım; tool detayları açılır, onaylar tek karar satırı, cihaz hedefi header’da görünsün. Böylece ürün sakin kalır ama işlem yapılabilir olur.`;
    }

    function randomImageStyle() {
      const gradients = [
        'background: radial-gradient(circle at 28% 20%, var(--accent-2), transparent 23%), radial-gradient(circle at 68% 70%, var(--accent), transparent 24%), linear-gradient(135deg, var(--surface-3), var(--accent-bg));',
        'background: radial-gradient(circle at 50% 35%, var(--status), transparent 25%), linear-gradient(145deg, var(--accent-bg), var(--surface-1));',
        'background: conic-gradient(from 220deg at 50% 50%, var(--surface-3), var(--accent), var(--accent-2), var(--surface-2), var(--surface-3));',
        'background: linear-gradient(135deg, var(--surface-1), var(--surface-3) 45%, var(--accent-bg));'
      ];
      return gradients[Math.floor(Math.random() * gradients.length)];
    }

    function generateImageFromForm() {
      const prompt = $('#imgPrompt').value.trim() || 'warm paper memory mark';
      const style = randomImageStyle();
      const img = { id: uid('img'), prompt, style, created: 'Şimdi' };
      state.generatedImages.unshift(img);
      addNotification('system', 'Görsel üretildi', 'Yeni taslak çıktı olarak kaydedildi.', true);
      toast('Görsel hazır', 'Önizleme çıktılar bölümüne eklendi.');
      render();
    }

    function addNotification(type, title, body, unread = true) {
      state.notifications.unshift({ id: uid('n'), type, title, body, unread, time: 'Şimdi' });
    }

    function approveMessage(id) {
      const msg = state.messages.find(m => m.id === id);
      if (!msg) return;
      msg.status = 'approved';
      if (msg.risk === 'high') {
        addMessage({ type: 'tool', summary: 'silme simülasyonu tamamlandı', target: activeDevice().name, detail: '$ rm ./logs/*.log\nremoved 17 mock log files\nfreed 193 MB' });
        addMessage({ role: 'agent', content: 'İşlemi mock ortamında tamamladım. Gerçek üründe bu adım geri alınamaz olduğu için işlem öncesi son bir özet daha gösterilir.' });
      } else {
        addMessage({ type: 'tool', summary: 'dosya okundu', target: activeDevice().name, open: true, detail: 'RUNA-DESIGN-BRIEF.md\n- Runa çok cihazlı AI iş ortağıdır.\n- Ana chat varsayılan yüzeydir.\n- Tool aktivitesi tek satırdır.\n- Gelişmiş detaylar isteğe bağlıdır.' });
        addMessage({ role: 'agent', content: 'İlgili kısım şu: Runa’nın ana yüzeyi sohbet olmalı; cihaz ve çalışma detayları sohbeti boğmadan, kısa satırlar ve gerektiğinde açılan detaylar olarak kalmalı.' });
      }
      toast('Onaylandı', 'Akış devam etti.');
      render();
    }

    function rejectMessage(id) {
      const msg = state.messages.find(m => m.id === id);
      if (!msg) return;
      msg.status = 'rejected';
      addMessage({ role: 'agent', content: 'Tamam, bu işlemi yapmıyorum. İstersen aynı hedef için sadece özet çıkarabilirim.' });
      toast('Vazgeçildi', 'İşlem çalıştırılmadı.');
      render();
    }

    function toast(title, body = '') {
      const stack = $('#toastStack');
      const node = document.createElement('div');
      node.className = 'toast';
      node.innerHTML = `${markSvg('runa-mark', 'micro', 'brand')}<div><strong>${esc(title)}</strong>${body ? `<span>${esc(body)}</span>` : ''}</div>`;
      stack.appendChild(node);
      setTimeout(() => node.remove(), 3600);
    }

    function showModal(title, body, foot = '') {
      $('#modalRoot').innerHTML = `<div class="modal-head"><div class="modal-title" id="modalTitle">${title}</div><button class="icon-btn" data-action="close-modal">×</button></div><div class="modal-body">${body}</div>${foot ? `<div class="modal-foot">${foot}</div>` : ''}`;
      $('#modalBackdrop').classList.add('open');
      $('#modalRoot').classList.add('open');

    function openSheet(name) {
      let title = 'Menü', body = '';
      if (name === 'menu') {
        body = `<div class="sheet-list">${navItems().map(([view, icon, label, badge]) => `<button class="sheet-item" data-action="nav" data-view="${view}"><span>${icon} ${label}</span>${badge ? `<span class="nav-badge">${badge}</span>` : '<span>›</span>'}</button>`).join('')}<button class="sheet-item" data-action="nav" data-view="account"><span>◌ Hesap</span><span>›</span></button><button class="sheet-item" data-action="toggle-advanced"><span>◆ Gelişmiş görünüm</span><span>${state.settings.advanced ? 'Açık' : 'Kapalı'}</span></button></div>`;
      }
      if (name === 'history') {
        title = 'Geçmiş';
        body = `<div class="sheet-list"><button class="sheet-item" data-action="new-chat"><span>+ Yeni sohbet</span><span>›</span></button>${state.conversations.map(c => `<button class="sheet-item" data-action="open-conversation" data-id="${c.id}"><span>${esc(c.title)}<br><small class="muted">${esc(c.meta)}</small></span><span>›</span></button>`).join('')}</div>`;
      }
      if (name === 'devices') {
        title = 'Cihazlar';
        body = `<div class="sheet-list">${state.devices.map(d => `<button class="sheet-item" data-action="select-device" data-id="${d.id}"><span>${d.icon} ${esc(d.name)}<br><small class="muted">${d.status === 'online' ? 'çevrimiçi' : 'çevrimdışı'} · ${esc(d.kind)}</small></span><span>${state.activeDeviceId === d.id ? 'aktif' : '›'}</span></button>`).join('')}</div>`;
      }
      if (name === 'attach') {
        title = 'Ekle';
        body = `<div class="sheet-list"><button class="sheet-item" data-action="open-file-picker"><span>▤ Dosya yükle</span><span>›</span></button><button class="sheet-item" data-action="nav" data-view="images"><span>✦ Görsel üret</span><span>›</span></button><button class="sheet-item" data-action="open-sheet" data-sheet="devices"><span>▭ Hedef cihaz seç</span><span>${esc(activeDevice().name)}</span></button><button class="sheet-item" data-action="request-read-approval"><span>✓ Okuma onayı dene</span><span>›</span></button></div>`;
      }
      $('#sheetRoot').innerHTML = `<div class="sheet-head"><div class="sheet-title">${title}</div><button class="icon-btn" data-action="close-sheet">×</button></div><div class="sheet-body">${body}</div>`;
      $('#sheetBackdrop').classList.add('open');
      $('#sheetRoot').classList.add('open');
    }
    function closeSheet() { $('#sheetBackdrop').classList.remove('open'); $('#sheetRoot').classList.remove('open'); }

    const commands = [
      ['chat', '💬 Sohbete git', 'Ana chat yüzeyi'], ['images', '✦ Görsel üret', 'Görsel üretim paneli'], ['files', '▤ Dosyalar', 'Dosya ve diff akışı'], ['devices', '▭ Cihazlar', 'Hedef cihaz seç'], ['settings', '⚙ Ayarlar', 'Tema ve gelişmiş görünüm'], ['notifications', '🔔 Bildirimler', 'Onay ve hatırlatmalar'], ['new-chat', '+ Yeni sohbet', 'Boş sohbet aç'], ['advanced', '◆ Gelişmiş görünüm', 'Aç / kapat']
    ];
    function openCommandPalette() {
      $('#paletteBackdrop').classList.add('open'); $('#commandPalette').classList.add('open'); $('#commandInput').value = ''; renderCommandList(''); setTimeout(() => $('#commandInput').focus(), 20);
    }
    function closeCommandPalette() { $('#paletteBackdrop').classList.remove('open'); $('#commandPalette').classList.remove('open'); }
    function renderCommandList(q) {
      const query = q.toLocaleLowerCase('tr-TR');
      const list = commands.filter(c => c.join(' ').toLocaleLowerCase('tr-TR').includes(query));
      $('#commandList').innerHTML = list.map(c => `<button class="palette-item" data-action="command" data-command="${c[0]}"><span>${c[1].split(' ')[0]}</span><span>${esc(c[1].replace(/^. /,''))}<br><small>${esc(c[2])}</small></span><span>↵</span></button>`).join('') || '<div class="muted" style="padding:16px">Sonuç yok</div>';
    }

    function handleCommand(cmd) {
      if (cmd === 'new-chat') newChat();
      else if (cmd === 'advanced') { state.settings.advanced = !state.settings.advanced; toast('Gelişmiş görünüm', state.settings.advanced ? 'Açıldı' : 'Kapandı'); render(); }
      else { state.currentView = cmd; render(); }
      closeCommandPalette(); closeSheet();
    }

    function newChat() {
      const id = uid('conv');
      state.conversations.unshift({ id, title: 'Yeni sohbet', meta: 'Şimdi · 1 mesaj' });
      state.activeConversationId = id;
      state.messages = [{ id: uid('m'), role: 'agent', content: 'Yeni sohbet hazır. Hangi cihazda ne yapmamı istersin?' }];
      state.currentView = 'chat';
      toast('Yeni sohbet', 'Boş sohbet açıldı.');
      render();
    }

    function selectDevice(id) {
      const device = state.devices.find(d => d.id === id);
      if (!device) return;
      if (device.status !== 'online') { toast('Cihaz çevrimdışı', `${device.name} son görüldü: ${device.last}`); return; }
      state.activeDeviceId = id;
      addMessage({ type: 'tool', summary: 'Hedef değişti', target: device.name, detail: `target: ${device.name}\nstatus: online\ncapabilities: ${device.capabilities.join(', ')}` });
      toast('Hedef değişti', `${device.name} üzerinde çalışılacak.`);
      closeSheet(); render();
    }

    function showAddDevice() {
      showModal('Cihaz ekle', `<p class="muted">QR kod veya pairing code yok. Yeni cihazda Runa’yı açıp aynı hesapla giriş yapman yeterli; cihaz otomatik görünür.</p><div class="grid-3" style="margin-top:14px"><div class="choice-card selected"><div class="choice-icon">▭</div><div class="choice-title">Mac / Windows</div><div class="choice-desc">Masaüstü uygulamasını indir ve giriş yap.</div></div><div class="choice-card selected"><div class="choice-icon">⌷</div><div class="choice-title">Linux / Server</div><div class="choice-desc">CLI ajanı kur, aynı hesapla başlat.</div></div><div class="choice-card selected"><div class="choice-icon">📱</div><div class="choice-title">Telefon</div><div class="choice-desc">Mobil uygulamada aynı hesap yeterli.</div></div></div>`, `<button class="ghost-btn" data-action="close-modal">Kapat</button><button class="primary-btn" data-action="simulate-add-device">Demo cihaz ekle</button>`);
    }

    function addDemoDevice() {
      const id = uid('device');
      state.devices.push({ id, icon: '▭', name: 'Studio Mac mini', kind: 'macOS', status: 'online', current: false, last: 'Şimdi', os: 'macOS 15', capabilities: ['Terminal', 'Dosya', 'Görsel'] });
      closeModal(); toast('Cihaz eklendi', 'Studio Mac mini çevrimiçi görünüyor.'); render();
    }

    function requestReadApproval() {
      state.currentView = 'chat';
      addMessage({ type: 'approval', risk: 'low', status: 'pending', question: 'Seçili dosyaları okuyup kısa özet çıkarabilirim — izin verir misin?', target: state.files.filter(f => f.selected).map(f => f.name).join(', ') || 'RUNA-DESIGN-BRIEF.md', detail: 'tool: file.read\ncall_id: mock_batch_read_91' });
      closeSheet(); render();
    }
    function requestDangerApproval() {
      state.currentView = 'chat';
      addMessage({ type: 'approval', risk: 'high', status: 'pending', question: 'Seçili geçici dosyaları kalıcı olarak silmek istiyorum. Devam edeyim mi?', target: 'rm ./tmp/runa-preview-*', approveLabel: 'Yine de sil', detail: 'tool: shell.exec\nrisk: destructive\ncall_id: mock_high_662' });
      render();
    }

    function exportData() {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = 'runa-mock-state.json'; a.click(); URL.revokeObjectURL(url);
      toast('Dışa aktarıldı', 'Mock state JSON olarak indirildi.');
    }

    document.addEventListener('click', event => {
      const el = event.target.closest('[data-action]');
      if (!el) return;
      const action = el.dataset.action;
      if (action === 'auth-tab') { state.authMode = el.dataset.mode; render(); }
      if (action === 'fill-demo-auth') { $('#authEmail').value = 'deniz@runa.local'; $('#authPassword').value = 'runa-demo'; toast('Demo bilgiler dolduruldu'); }
      if (action === 'demo-login' || action === 'oauth') { state.auth = true; state.onboarding = true; state.onboardingStep = 0; if (el.dataset.advanced) state.settings.advanced = true; toast(action === 'oauth' ? `${el.dataset.provider} ile giriş simüle edildi` : 'Demo açılıyor'); render(); }
      if (action === 'reset-mock') { localStorage.removeItem(STORAGE_KEY); state = defaultState(); toast('Sıfırlandı', 'Mock başlangıç haline döndü.'); render(); }
      if (action === 'onboarding-next') { if (state.onboardingStep < 2) state.onboardingStep += 1; else { state.onboarding = false; state.auth = true; state.settings.tone = state.onboardingPrefs.tone || state.settings.tone; toast('Runa hazır', 'Tüm mock akışları açıldı.'); } render(); }
      if (action === 'onboarding-back') { if (state.onboardingStep === 0) { state.onboarding = false; state.auth = true; } else state.onboardingStep -= 1; render(); }
      if (action === 'onboarding-pref') { const key = el.dataset.key; state.onboardingPrefs[key] = el.dataset.value; if (key === 'tone') state.settings.tone = el.dataset.value; render(); }
      if (action === 'set-length') { state.settings.length = el.dataset.value; render(); }
      if (action === 'nav') { state.currentView = el.dataset.view; closeSheet(); render(); }
      if (action === 'open-command') openCommandPalette();
      if (action === 'close-command') closeCommandPalette();
      if (action === 'command') handleCommand(el.dataset.command);
      if (action === 'new-chat') { closeSheet(); newChat(); }
      if (action === 'open-conversation') { state.activeConversationId = el.dataset.id; state.currentView = 'chat'; closeSheet(); toast('Sohbet açıldı'); render(); }
      if (action === 'toggle-advanced') { state.settings.advanced = !state.settings.advanced; toast('Gelişmiş görünüm', state.settings.advanced ? 'Açıldı' : 'Kapandı'); closeSheet(); render(); }
      if (action === 'open-sheet') openSheet(el.dataset.sheet);
      if (action === 'close-sheet') closeSheet();
      if (action === 'close-modal') closeModal();
      if (action === 'suggest') sendChat(el.dataset.text);
      if (action === 'toggle-message') { const msg = state.messages.find(m => m.id === el.dataset.id); if (msg) msg.open = !msg.open; render(); }
      if (action === 'approval-approve') approveMessage(el.dataset.id);
      if (action === 'approval-reject') rejectMessage(el.dataset.id);
      if (action === 'undo-approval') { const msg = state.messages.find(m => m.id === el.dataset.id); if (msg) msg.status = 'pending'; render(); }
      if (action === 'retry-last') { toast('Yeniden denendi', 'Mock cihaz/komut yeniden tetiklendi.'); addMessage({ role: 'agent', content: 'Yeniden denedim; MacBook Pro hedefinde sorun görünmüyor.' }); render(); }
      if (action === 'set-theme') { state.settings.theme = el.dataset.theme; toast('Tema değişti'); render(); }
      if (action === 'settings-tab') { state.settingsTab = el.dataset.tab; render(); }
      if (action === 'show-add-device') showAddDevice();
      if (action === 'simulate-add-device') addDemoDevice();
      if (action === 'select-device') selectDevice(el.dataset.id);
      if (action === 'retry-device') { toast('Bağlantı denendi', 'Cihaz çevrimiçi olduğunda haber verilecek.'); addNotification('device', 'Cihaz izleniyor', 'Windows PC çevrimiçi olunca tekrar denenecek.', true); render(); }
      if (action === 'device-details') { const d = state.devices.find(x => x.id === el.dataset.id); showModal(d.name, `<div class="device-card active"><span class="device-icon">${d.icon}</span><div><div class="device-title">${esc(d.name)}</div><div class="device-meta">${esc(d.status)} · ${esc(d.os)} · ${esc(d.last)}</div><div class="chip-row">${d.capabilities.map(c => `<span class="chip">${esc(c)}</span>`).join('')}</div></div></div>`, '<button class="primary-btn" data-action="close-modal">Tamam</button>'); }
      if (action === 'simulate-device-online') { const d = state.devices.find(x => x.id === 'windows'); d.status = 'online'; d.last = 'Şimdi'; toast('Windows PC çevrimiçi', 'Artık hedef seçilebilir.'); render(); }
      if (action === 'open-file-picker') $('#fileInput').click();
      if (action === 'select-all-files') { const all = state.files.some(f => !f.selected); state.files.forEach(f => f.selected = all); render(); }
      if (action === 'read-file') { const file = state.files.find(f => f.id === el.dataset.id); state.currentView = 'chat'; addMessage({ type: 'approval', risk: 'low', status: 'pending', question: `${file.name} dosyasını okuyabilirim — izin verir misin?`, target: file.name, detail: 'tool: file.read\ncall_id: mock_file_read' }); render(); }
      if (action === 'summarize-file') { const file = state.files.find(f => f.id === el.dataset.id); state.currentView = 'chat'; addMessage({ role: 'user', content: `${file.name} dosyasını özetle` }); addMessage({ role: 'agent', content: `${file.name} için kısa özet: ana kararlar chat-first yüzey, sakin approval ve cihaz hedefinin header’da gösterilmesi etrafında toplanıyor.` }); render(); }
      if (action === 'summarize-selected') { const count = state.files.filter(f => f.selected).length; state.currentView = 'chat'; addMessage({ role: 'agent', content: `${count} dosya için ortak özet: tasarım dili Warm Paper/Ember, ürün modeli çok cihazlı chat companion, ana disiplin ise debug detaylarını varsayılanda gizlemek.` }); render(); }
      if (action === 'request-read-approval') requestReadApproval();
      if (action === 'request-danger-approval') requestDangerApproval();
      if (action === 'segment') { const parent = el.closest('.segmented'); parent.querySelectorAll('button').forEach(b => b.classList.remove('active')); el.classList.add('active'); }
      if (action === 'clear-images') { state.generatedImages = []; toast('Çıktılar temizlendi'); render(); }
      if (action === 'image-to-chat') { const img = state.generatedImages.find(i => i.id === el.dataset.id); state.currentView = 'chat'; addMessage({ type: 'image', content: 'Bu görseli sohbet akışına ekledim.', prompt: img.prompt, style: img.style, kind: 'Generated Mock', size: '1024×1024' }); render(); }
      if (action === 'save-generated') { addMessage({ type: 'approval', risk: 'low', status: 'pending', question: 'Bu çıktıyı proje dosyalarına kaydedebilirim — izin verir misin?', target: 'assets/runa-generated-preview.png', detail: 'tool: file.write\ncall_id: mock_save_image' }); state.currentView = 'chat'; toast('Kaydetme onayı istendi'); render(); }
      if (action === 'variation') { const msg = state.messages.find(m => m.id === el.dataset.id); if (msg) { msg.style = randomImageStyle(); toast('Varyasyon üretildi'); render(); } }
      if (action === 'download-mock') toast('İndirme hazır', 'Mock ortamında indirme simüle edildi.');
      if (action === 'notif-filter') { state.notificationFilter = el.dataset.filter; render(); }
      if (action === 'mark-all-read') { state.notifications.forEach(n => n.unread = false); toast('Bildirimler okundu'); render(); }
      if (action === 'open-notif') { const n = state.notifications.find(x => x.id === el.dataset.id); n.unread = false; if (n.type === 'approval') state.currentView = 'chat'; toast(n.title, n.body); render(); }
      if (action === 'snooze-notif') { const n = state.notifications.find(x => x.id === el.dataset.id); n.unread = false; state.reminders.push({ title: n.title, at: '1 saat sonra' }); toast('Ertelendi', '1 saat sonra hatırlatılacak.'); render(); }
      if (action === 'new-reminder') showModal('Hatırlatma ekle', `<form id="reminderForm"><div class="field"><label>Başlık</label><input class="input" id="reminderTitle" value="Launch kontrolü"></div><div class="field"><label>Zaman</label><input class="input" id="reminderTime" value="Bugün 16:00"></div><button class="primary-btn" type="submit">Ekle</button></form>`);
      if (action === 'export-data') exportData();
      if (action === 'logout') { state.auth = false; state.onboarding = false; toast('Çıkış yapıldı'); render(); }
      if (action === 'delete-account-mock') { localStorage.removeItem(STORAGE_KEY); state = defaultState(); toast('Mock hesap silindi'); render(); }
    });

    document.addEventListener('submit', event => {
      if (event.target.id === 'authForm') {
        event.preventDefault();
        const email = $('#authEmail').value.trim(); const password = $('#authPassword').value.trim();
        if (!email.includes('@') || password.length < 4) { const e = $('#authError'); e.textContent = 'E-posta ve şifre alanlarını kontrol et.'; e.classList.add('show'); return; }
        state.profile.email = email; if ($('#authName')) state.profile.name = $('#authName').value.trim() || state.profile.name;
        state.auth = true; state.onboarding = state.authMode === 'signup'; state.onboardingStep = 0;
        toast(state.authMode === 'signup' ? 'Hesap oluşturuldu' : 'Giriş yapıldı', state.onboarding ? 'Kısa kurulum başlıyor.' : 'Runa hazır.'); render();
      }
      if (event.target.id === 'chatForm') { event.preventDefault(); sendChat(); }
      if (event.target.id === 'imageForm') { event.preventDefault(); generateImageFromForm(); }
      if (event.target.id === 'profileForm') { event.preventDefault(); state.profile.name = $('#profileName').value; state.profile.email = $('#profileEmail').value; state.profile.company = $('#profileCompany').value; state.profile.role = $('#profileRole').value; toast('Profil kaydedildi'); render(); }
      if (event.target.id === 'reminderForm') { event.preventDefault(); const title = $('#reminderTitle').value; const at = $('#reminderTime').value; state.notifications.unshift({ id: uid('n'), type: 'reminder', unread: true, title, body: `${at} için hatırlatma`, time: 'Şimdi' }); closeModal(); toast('Hatırlatma eklendi'); render(); }
    });

    document.addEventListener('change', event => {
      const el = event.target;
      if (el.dataset.actionChange === 'setting') { const key = el.dataset.key; state.settings[key] = el.type === 'checkbox' ? el.checked : el.value; if (key === 'advanced') toast('Gelişmiş görünüm', el.checked ? 'Açıldı' : 'Kapandı'); render(); }
      if (el.dataset.actionChange === 'toggle-file') { const f = state.files.find(file => file.id === el.dataset.id); if (f) f.selected = el.checked; render(); }
    });

    document.addEventListener('input', event => {
      if (event.target.id === 'commandInput') renderCommandList(event.target.value);
      if (event.target.id === 'imgQuality') $('#qualityLabel').textContent = event.target.value;
      if (event.target.id === 'fileSearch') {
        const q = event.target.value.toLocaleLowerCase('tr-TR');
        $$('[data-file-row]').forEach(row => { const file = state.files.find(f => f.id === row.dataset.fileRow); row.style.display = file.name.toLocaleLowerCase('tr-TR').includes(q) ? '' : 'none'; });
      }
    });

    document.addEventListener('keydown', event => {
      if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === 'k') { event.preventDefault(); openCommandPalette(); }
      if ((event.metaKey || event.ctrlKey) && event.shiftKey && event.key.toLowerCase() === 'd') { event.preventDefault(); state.settings.advanced = !state.settings.advanced; toast('Gelişmiş görünüm', state.settings.advanced ? 'Açıldı' : 'Kapandı'); render(); }
      if (event.key === 'Escape') { closeCommandPalette(); closeModal(); closeSheet(); }
      if (event.key === 'Enter' && $('#commandPalette').classList.contains('open') && document.activeElement === $('#commandInput')) { const first = $('#commandList [data-command]'); if (first) first.click(); }
    });

    $('#fileInput').addEventListener('change', event => {
      const files = Array.from(event.target.files || []);
      files.forEach(file => state.files.unshift({ id: uid('f'), name: file.name, type: file.type || 'Dosya', size: Math.ceil(file.size / 1024) + ' KB', modified: 'Şimdi', selected: true }));
      if (files.length) { toast('Dosya yüklendi', `${files.length} dosya listeye eklendi.`); state.currentView = 'files'; render(); }
      event.target.value = '';
    });

    render();
  </script>
</body>
</html>
