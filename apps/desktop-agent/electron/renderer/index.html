<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';">
	<title>Runa Desktop</title>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
			background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
			color: #e5e7eb;
			min-height: 100vh;
			display: flex;
			flex-direction: column;
		}

		.app-container {
			display: flex;
			flex-direction: column;
			min-height: 100vh;
			padding: 24px;
		}

		.app-header {
			display: flex;
			align-items: center;
			justify-content: space-between;
			margin-bottom: 48px;
		}

		.app-title {
			font-size: 28px;
			font-weight: 700;
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
			-webkit-background-clip: text;
			-webkit-text-fill-color: transparent;
			background-clip: text;
		}

		.version-badge {
			font-size: 12px;
			color: #9ca3af;
			background: rgba(255, 255, 255, 0.05);
			padding: 4px 12px;
			border-radius: 16px;
		}

		.app-main {
			flex: 1;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			gap: 32px;
		}

		.status-card {
			display: flex;
			align-items: center;
			gap: 16px;
			background: rgba(255, 255, 255, 0.05);
			border: 1px solid rgba(255, 255, 255, 0.1);
			border-radius: 16px;
			padding: 24px 32px;
			min-width: 300px;
		}

		.status-indicator {
			width: 16px;
			height: 16px;
			border-radius: 50%;
			animation: pulse 2s ease-in-out infinite;
		}

		@keyframes pulse {
			0%, 100% { opacity: 1; }
			50% { opacity: 0.5; }
		}

		.status-content {
			display: flex;
			flex-direction: column;
			gap: 4px;
		}

		.status-label {
			font-size: 12px;
			color: #9ca3af;
			text-transform: uppercase;
			letter-spacing: 0.05em;
		}

		.status-value {
			font-size: 18px;
			font-weight: 600;
		}

		.info-grid {
			display: grid;
			grid-template-columns: repeat(2, 1fr);
			gap: 16px;
			width: 100%;
			max-width: 400px;
		}

		.info-item {
			display: flex;
			flex-direction: column;
			gap: 4px;
			background: rgba(255, 255, 255, 0.03);
			padding: 12px 16px;
			border-radius: 8px;
		}

		.info-label {
			font-size: 11px;
			color: #6b7280;
			text-transform: uppercase;
			letter-spacing: 0.05em;
		}

		.info-value {
			font-size: 14px;
			font-weight: 500;
		}

		.actions {
			display: flex;
			gap: 12px;
			margin-top: 16px;
		}

		.action-button {
			padding: 12px 32px;
			border-radius: 8px;
			font-size: 14px;
			font-weight: 600;
			cursor: pointer;
			border: none;
			transition: all 0.2s ease;
		}

		.action-button.primary {
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
			color: white;
		}

		.action-button.primary:hover {
			transform: translateY(-2px);
			box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
		}

		.action-button.secondary {
			background: rgba(255, 255, 255, 0.1);
			color: #e5e7eb;
			border: 1px solid rgba(255, 255, 255, 0.2);
		}

		.action-button.secondary:hover {
			background: rgba(255, 255, 255, 0.15);
		}

		.app-footer {
			text-align: center;
			padding: 16px;
			color: #4b5563;
			font-size: 12px;
		}
	</style>
</head>
<body>
	<div id="root"></div>
	<script type="module" src="./App.js"></script>
</body>
</html>
