appId: com.runa.desktop-agent
productName: "Runa Desktop"
copyright: "Copyright © 2026 Runa Team"

directories:
  output: release
  buildResources: build

files:
  - electron/**/*
  - build/**/*
  - package.json

extraMetadata:
  main: electron/main.cjs

protocols:
  - name: Runa Desktop
    schemes:
      - runa

asar: true
afterPack: ./scripts/apply-fuses.mjs

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  executableName: "Runa Desktop"
  signAndEditExecutable: false

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico

# Electron-builder config
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/

# Build configuration
npmRebuild: false
nodeGypRebuild: false
