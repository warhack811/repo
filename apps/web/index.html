<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
		<meta
			name="description"
			content="Runa is a calm, chat-first work companion with technical controls kept in a separate developer layer."
		/>
		<meta name="theme-color" content="#0b1120" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Runa" />
		<meta name="format-detection" content="telephone=no" />
		<link rel="manifest" href="%BASE_URL%manifest.json" />
		<link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
		<link rel="icon" type="image/png" sizes="32x32" href="%BASE_URL%icons/favicon-32.png" />
		<link rel="apple-touch-icon" href="%BASE_URL%icons/apple-touch-icon.png" />
		<link
			rel="preload"
			href="%BASE_URL%fonts/Inter.var.woff2"
			as="font"
			type="font/woff2"
			crossorigin
		/>
		<link
			rel="preload"
			href="%BASE_URL%fonts/InstrumentSerif-Regular.woff2"
			as="font"
			type="font/woff2"
			crossorigin
		/>
		<title>Runa</title>
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
		<script>
			window.__RUNA_SW_PATH__ = '%BASE_URL%sw.js';
		</script>
		<script type="module">
			const serviceWorkerPath = window.__RUNA_SW_PATH__;

			if ('serviceWorker' in navigator && window.isSecureContext) {
				window.addEventListener('load', () => {
					navigator.serviceWorker.register(serviceWorkerPath).catch((error) => {
						console.warn('Runa service worker registration failed.', error);
					});
				});
			}
		</script>
	</body>
</html>
