<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Empty state smoke fixture</title>
<style>
  body { margin: 0; font-family: system-ui, sans-serif; background: #fff; color: #222; }
  .runa-chat-empty-hero__mark { display: block; width: 48px; height: 48px; background: #0a7; border-radius: 50%; }
  .runa-chat-empty-hero__title { font-size: 20px; font-weight: 700; margin: 8px 0 4px; }
  .runa-chat-empty-hero__lead { font-size: 16px; color: #555; margin: 0 0 8px; }
  .runa-chat-empty-hero__context { font-size: 14px; color: #666; margin: 0 0 8px; }
  .runa-chat-empty-context { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .runa-chat-empty-context__chip { background: #eee; border-radius: 4px; font-size: 12px; font-weight: 600; padding: 3px 9px; }
  .runa-chat-suggestion-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .runa-chat-suggestion { display: flex; gap: 12px; align-items: flex-start; min-height: 92px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; background: #f9f9f9; cursor: pointer; width: 100%; text-align: left; }
  .runa-chat-suggestion__copy { display: grid; gap: 4px; }
  .runa-chat-suggestion__label { font-size: 14px; font-weight: 700; color: #111; }
  .runa-chat-suggestion__description { font-size: 12px; color: #555; line-height: 1.4; }
  .runa-chat-empty-state__tip { font-size: 12px; color: #888; margin-top: 12px; }
  @media (max-width: 540px) { .runa-chat-suggestion-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="runa-chat-empty-state" aria-label="Başlangıç önerileri">
  <section class="runa-chat-empty-hero">
    <span class="runa-chat-empty-hero__mark" aria-hidden="true"></span>
    <h1 class="runa-chat-empty-hero__title">Günaydın</h1>
    <p class="runa-chat-empty-hero__lead">Nereden başlayalım?</p>
    <p class="runa-chat-empty-hero__context">Runa ve masaüstü cihazın hazır.</p>
    <div class="runa-chat-empty-context">
      <span class="runa-chat-empty-context__chip">Proje: Runa</span>
      <span class="runa-chat-empty-context__chip">Cihaz hazır</span>
      <span class="runa-chat-empty-context__chip">3 konuşma</span>
    </div>
  </section>
  <div class="runa-chat-suggestion-grid">
    <button type="button" aria-label="Kod işini güvenle ilerlet: İlgili dosyaları bul, değişikliği planla ve test kanıtıyla kapat." class="runa-chat-suggestion">
      <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><path d="m18 16 4-4-4-4"/><path d="m6 8-4 4 4 4"/><path d="m14.5 4-5 16"/></svg>
      <span class="runa-chat-suggestion__copy">
        <strong class="runa-chat-suggestion__label">Kod işini güvenle ilerlet</strong>
        <span class="runa-chat-suggestion__description">İlgili dosyaları bul, değişikliği planla ve test kanıtıyla kapat.</span>
      </span>
    </button>
    <button type="button" aria-label="Bir hatayı araştır: Belirtiyi, olası nedeni ve kalıcı çözümü ayır." class="runa-chat-suggestion">
      <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 20v-9"/><path d="M14 7a4 4 0 0 1 4 4v3a6 6 0 0 1-12 0v-3a4 4 0 0 1 4-4z"/><path d="M14.12 3.88 16 2"/></svg>
      <span class="runa-chat-suggestion__copy">
        <strong class="runa-chat-suggestion__label">Bir hatayı araştır</strong>
        <span class="runa-chat-suggestion__description">Belirtiyi, olası nedeni ve kalıcı çözümü ayır.</span>
      </span>
    </button>
    <button type="button" aria-label="Araştırma notu çıkar: Kaynakları ayır, çelişkileri belirt ve karar notu hazırla." class="runa-chat-suggestion">
      <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><path d="m21 21-4.34-4.34"/><circle cx="11" cy="11" r="8"/></svg>
      <span class="runa-chat-suggestion__copy">
        <strong class="runa-chat-suggestion__label">Araştırma notu çıkar</strong>
        <span class="runa-chat-suggestion__description">Kaynakları ayır, çelişkileri belirt ve karar notu hazırla.</span>
      </span>
    </button>
    <button type="button" aria-label="Dokümanı netleştir: Taslağı hedefe, okuyucuya ve aksiyonlara göre düzenle." class="runa-chat-suggestion">
      <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 22a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.704.706l3.588 3.588A2.4 2.4 0 0 1 20 8v12a2 2 0 0 1-2 2z"/><path d="M14 2v5a1 1 0 0 0 1 1h5"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>
      <span class="runa-chat-suggestion__copy">
        <strong class="runa-chat-suggestion__label">Dokümanı netleştir</strong>
        <span class="runa-chat-suggestion__description">Taslağı hedefe, okuyucuya ve aksiyonlara göre düzenle.</span>
      </span>
    </button>
  </div>
  <p class="runa-chat-empty-state__tip">İpucu: Ctrl+K ile komut paleti açılır.</p>
</div>
</body>
</html>
