name: runa

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-runa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-runa}
      POSTGRES_USER: ${POSTGRES_USER:-runa}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-runa} -d ${POSTGRES_DB:-runa}
      interval: 10s
      timeout: 5s
      retries: 6
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build:
      context: .
      dockerfile: ./apps/server/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_TARGET: ${DATABASE_TARGET:-local}
      DATABASE_URL: ${DATABASE_URL:-postgresql://runa:runa@postgres:5432/runa}
      PORT: 3000
      RUNA_DEBUG_PERSISTENCE: ${RUNA_DEBUG_PERSISTENCE:-0}
      RUNA_DEV_AUTH_EMAIL: ${RUNA_DEV_AUTH_EMAIL:-dev@runa.local}
      RUNA_DEV_AUTH_ENABLED: ${RUNA_DEV_AUTH_ENABLED:-1}
      RUNA_DEV_AUTH_SECRET: ${RUNA_DEV_AUTH_SECRET:-compose-dev-secret}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-local-storage-placeholder}
      SUPABASE_STORAGE_BUCKET: ${SUPABASE_STORAGE_BUCKET:-runa-artifacts}
      SUPABASE_STORAGE_PREFIX: ${SUPABASE_STORAGE_PREFIX:-runa}
      SUPABASE_URL: ${SUPABASE_URL:-https://example.supabase.co}
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000/health').then((response)=>{if(!response.ok) process.exit(1);}).catch(()=>process.exit(1))
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    ports:
      - "${RUNA_SERVER_PORT:-3000}:3000"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      args:
        RUNA_SERVER_UPSTREAM: ${RUNA_SERVER_UPSTREAM:-http://server:3000}
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null http://127.0.0.1/ || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    ports:
      - "${RUNA_WEB_PORT:-8080}:80"
    restart: unless-stopped

volumes:
  postgres_data:
